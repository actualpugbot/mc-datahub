name: Deploy Pages assets

# Publishes the committed `pages/` asset bundle (mob thumbnails + wiki sound
# library + config) to GitHub Pages for the pugtools.com mob tools.
#
# The heavy media is generated locally with `npm run build:pages` and committed,
# because its sources (gitignored workspace/ + the mob-voice-over repo) are not
# available in CI. This workflow only uploads + deploys what is already in pages/.

on:
  push:
    branches: [master]
    paths:
      - 'pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages
      - id: deployment
        uses: actions/deploy-pages@v4
